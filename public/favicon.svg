<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>
  <!-- X mark — AXIS wordmark motif, two crossing strokes -->
  <line x1="8" y1="8" x2="24" y2="24" stroke="#2dd4bf" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="8" y2="24" stroke="#2dd4bf" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#0f1117"/>
  <circle cx="16" cy="16" r="1.5" fill="#2dd4bf"/>
</svg>
